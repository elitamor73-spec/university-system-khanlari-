
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ورود دانشجو</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<h3>ورود دانشجو</h3>
{% if message %}<div class="alert alert-warning mt-3">{{ message }}</div>{% endif %}
<form method="post">
<input name="national_id" class="form-control mb-2" placeholder="کد ملی" required>
<input type="password" name="password" class="form-control mb-2" placeholder="رمز عبور" required>
<button class="btn btn-success">ورود</button>
</form>
<a href="/" class="btn btn-secondary mt-3">بازگشت</a>
</div>
</body>
</html>
