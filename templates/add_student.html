<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>افزودن دانشجو</title>
<style>
body{
    font-family:tahoma;
    direction:rtl;
    background:#f2f2f2;
    text-align:center;
}
.box{
    width:350px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:8px;
}
input{
    width:100%;
    padding:8px;
    margin:8px 0;
}
button{
    width:100%;
    padding:10px;
    background:#2e7d32;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>افزودن دانشجو</h2>

<form action="/add_student" method="post">

<input type="text" name="first_name" placeholder="نام" required>

<input type="text" name="last_name" placeholder="نام خانوادگی" required>

<input type="text" name="national_id" placeholder="کد ملی" required>

<input type="password" name="password" placeholder="رمز عبور" required>

<button type="submit">ثبت دانشجو</button>

</form>

</div>

</body>
</html>
