
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حذف دانشجو</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<h3>حذف دانشجو (مدیر)</h3>
{% if message and message != 'authorized' %}
<div class="alert alert-warning">{{ message }}</div>
{% endif %}
<form action="/admin-login" method="post" class="mb-3">
<input type="password" name="password" class="form-control mb-2" placeholder="رمز مدیر">
<button class="btn btn-danger">تایید رمز</button>
</form>
{% if message == 'authorized' %}
<table class="table table-bordered">
<tr><th>نام</th><th>نام خانوادگی</th><th>حذف</th></tr>
{% for s in students %}
<tr>
<td>{{ s.firstname }}</td>
<td>{{ s.lastname }}</td>
<td><a href="/delete/{{ s.id }}" class="btn btn-danger btn-sm">حذف</a></td>
</tr>
{% endfor %}
</table>
{% endif %}
<a href="/" class="btn btn-secondary">بازگشت</a>
</div>
</body>
</html>
